# Netlify configuration for serverless functions
[build]
  # No build needed for functions-only project
  publish = "."

# Functions configuration
[functions]
  # Directory where Netlify functions are located
  directory = "netlify/functions"

# Environment variables (set these in Netlify dashboard)
# GITHUB_TOKEN - GitHub Personal Access Token with repo access
# GH_OWNER - GitHub repository owner
# GH_REPO - GitHub repository name  
# GH_PATH - Path to Lua script in repository
# ACCESS_KEY - Optional access key for security

# Redirects and headers
[[redirects]]
  # Redirect root to function (optional)
  from = "/"
  to = "/.netlify/functions/load"
  status = 302

[[headers]]
  # Security headers for all responses
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
